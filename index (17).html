*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;font-size:14px}
nav{background:#1c1917;color:#fff;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100}

.wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct{font-size:15px;font-weight:700;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:12px}

input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none}

<script>
var APPS = JSON.parse(localStorage.getItem('apps')||'[]');
var DEPOSITS = JSON.parse(localStorage.getItem('deposits')||'[]');
var CARRYOVER = localStorage.getItem('carryover') !== null ? Number(localStorage.getItem('carryover')) : 100000; // 前月繰越（初期値10万円、締め処理後は保存値を使用）
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzDP-p1LhePq0_8WC25-QhoxgMSlxL9l5kppccLmuzkUYyxrL5jDYRzZ-NuV_0QIAmzMA/exec';

// ---- パスワード設定（ここを変更してください） ----
var ADMIN_PASSWORD = '1234';
// -------------------------------------------------

var ADMIN_MODE = false;
var CURRENT_FILTER = 'all';

function tryAdmin(){
  if(ADMIN_MODE){ showTab(2); return; }
  document.getElementById('pw-ov').classList.add('active');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').textContent='';
  setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
}

document.getElementById('pw-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkPw();
});

function checkPw(){
  var val = document.getElementById('pw-input').value;
  if(val === ADMIN_PASSWORD){
    closePw();
    enterAdmin();
  } else {
    document.getElementById('pw-err').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function closePw(){
  document.getElementById('pw-ov').classList.remove('active');
}

function enterAdmin(){
  ADMIN_MODE = true;
  var t2 = document.getElementById('t2');
  t2.style.display = 'block';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = 'ログアウト';
  btn.style.color = '#16a34a';
  btn.style.borderColor = '#16a34a';
  btn.onclick = logoutAdmin;
  showTab(2);
}

function logoutAdmin(){
  ADMIN_MODE = false;
  var t2 = document.getElementById('t2');
  t2.style.display = 'none';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = '管理';
  btn.style.color = '#9ca3af';
  btn.style.borderColor = '#4b5563';
  btn.onclick = tryAdmin;
  showTab(1);
}

// スプレッドシートに保存
function saveToSheet(app) {
  var data = Object.assign({action:'save'}, app);
  delete data.img;
  if(data.receipts) data.receipts = data.receipts.map(function(r){
    var r2 = Object.assign({},r); delete r2.b64; return r2;
  });
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet save error:', e);});
}

function updateSheet(id, updates) {
  var data = Object.assign({action:'update', id:id}, updates);
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet update error:', e);});
}

function loadFromSheet(cb) {
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'load'})
  })
  .then(function(r){return r.json();})
  .then(function(d){if(d.ok) cb(d); else cb(null);})
  .catch(function(e){console.log('Sheet load error:', e); cb(null);});
}

var ACS = ['会議費','交際費','旅費交通費','消耗品費','事務用品費','通信費','新聞図書費','厚生費','雑費'];
var AM = {'弁当':'会議費','サンドイッチ':'会議費','おにぎり':'会議費','お茶':'厚生費','コーヒー':'厚生費','飲料':'厚生費','ティッシュ':'消耗品費','洗剤':'消耗品費','ボールペン':'事務用品費','ノート':'事務用品費','電車':'旅費交通費','バス':'旅費交通費','タクシー':'旅費交通費','切手':'通信費','書籍':'新聞図書費'};
function gac(n){for(var k in AM)if(n.indexOf(k)>=0)return AM[k];return '雑費';}
function gid(){
  var d=new Date();
  var seq = (Number(localStorage.getItem('last_seq')||0)) + 1;
  localStorage.setItem('last_seq', String(seq));

function fmtDateJP(s){

  // ISO形式（2026-05-23T...）を YYYY-MM-DD に正規化してから表示
  var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'年'+parseInt(m[2])+'月'+parseInt(m[3])+'日';

}

function compressImage(dataUrl, mime, maxW, quality, cb){
  var img = new Image();
  img.onload = function(){
    var w = img.width, h = img.height;
    if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
    var cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    var out = cv.toDataURL('image/jpeg', quality);
    cb(out, 'image/jpeg');
  };
  img.src = dataUrl;
}

function addFiles(files){
  Array.prototype.forEach.call(files, function(f){
    if(!f.type.startsWith('image/')) return;
    var r = new FileReader();
    r.onload = function(e){
      var original = e.target.result;
      // 最大幅1200px・品質0.7で圧縮（容量を約1/5〜1/10に削減）
      compressImage(original, f.type, 1200, 0.70, function(compressed, mime){
        RECEIPTS.push({b64:compressed.split(',')[1], mime:mime, preview:compressed, data:null});
        renderThumbs();
      });
    };
    r.readAsDataURL(f);
  });
}

function rA(){
  // GASから申請データ・繰越額を取得（最も信頼できるソース）
  loadFromSheet(function(res){
    if(res){
      // 締め日以降のデータのみGASが返す
      APPS = res.data || [];
      // GASの設定シートから繰越額を反映
      if(res.carryover !== undefined){
        CARRYOVER = Number(res.carryover);
        localStorage.setItem('carryover', String(CARRYOVER));
      }
      // 申請IDの連番をGASと同期（大きい方を採用）
      if(res.last_seq !== undefined){
        var localSeq = Number(localStorage.getItem('last_seq')||0);
        var gasSeq = Number(res.last_seq);
        var maxSeq = Math.max(localSeq, gasSeq);
        localStorage.setItem('last_seq', String(maxSeq));
      }
    } else {
      // GAS通信失敗時はlocalStorageにフォールバック
      var savedCarryover = localStorage.getItem('carryover');
      if(savedCarryover !== null) CARRYOVER = Number(savedCarryover);
    }
    sv();

    fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'loadDeposits'})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      // 入金も完全上書き
      DEPOSITS = (d.ok && d.data) ? d.data : [];
      localStorage.setItem('deposits', JSON.stringify(DEPOSITS));
      renderAdminList();
    })
    .catch(function(e){
      console.log('Deposit load error:', e);
      renderAdminList();
    });
  });
}

function calcBalance(){
  var depositSum = DEPOSITS.reduce(function(s,d){return s+(d.amount||0);},0);
  var expenseSum = APPS.filter(isPaid).reduce(function(s,a){return s+(a.total||0);},0);
  return {
    balance: CARRYOVER + depositSum - expenseSum,
    depositSum: depositSum,
    expenseSum: expenseSum
  };
}

function updateBalanceUI(){
  var b = calcBalance();
  var el = document.getElementById('balance-display');
  if(el){
    el.textContent = '¥'+fmt(b.balance);

  }
  var dl = document.getElementById('deposit-total-label');
  if(dl) dl.textContent = '¥'+fmt(b.depositSum);
  var el2 = document.getElementById('expense-total-label');
  if(el2) el2.textContent = '¥'+fmt(b.expenseSum);
  var cl = document.getElementById('carryover-label');
  if(cl) cl.textContent = '¥'+fmt(CARRYOVER);
}

function buildSeisanshoHTML(a){
  function toReiwa(dateStr){
    if(!dateStr) return '';
    var d = new Date(dateStr);
    var reiwa = d.getFullYear() - 2018;
    return '令和'+reiwa+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  }
  function mdLabel(dateStr){
    if(!dateStr) return '';
    try{var d=new Date(dateStr);return (d.getMonth()+1)+'月'+d.getDate()+'日';}catch(e){return dateStr;}
  }

  var dateStr = a.settlement_date || a.date || today();
  var TOTAL_ROWS = 8;

  // ---- 明細行を組み立て ----
  var lines = [];
  if(a.receipts && a.receipts.length > 0){
    a.receipts.forEach(function(r){
      var txDate = mdLabel(r.date || dateStr);
      if(r.items && r.items.length > 0){
        r.items.forEach(function(it){
          lines.push({
            date: txDate,
            account: it.account || '',
            amount: it.amount,
            name: it.name + (r.store ? ' ('+r.store+')' : ''),
            qty: 1
          });
        });
      } else {
        lines.push({date:txDate, account:'', amount:r.total||0, name:r.store||'', qty:1});
      }
    });
  } else if(a.items && a.items.length > 0){
    var txDate = mdLabel(dateStr);
    a.items.forEach(function(it){
      lines.push({
        date: txDate,
        account: it.account || '',
        amount: it.amount,
        name: it.name + (a.store ? ' ('+a.store+')' : ''),
        qty: 1
      });
    });
  } else {
    lines.push({date:mdLabel(dateStr), account:'', amount:a.total||0, name:a.store||'', qty:1});
  }

  var itemRows = '';
  lines.forEach(function(l){
    itemRows +=
      '<tr style="height:17px">'+
      '<td style="border:1px solid #555;padding:2px 4px;text-align:center;white-space:nowrap">'+l.date+'</td>'+
      '<td style="border:1px solid #555;padding:2px 4px">'+l.account+'</td>'+
      '<td style="border:1px solid #555;padding:2px 4px;text-align:right;white-space:nowrap">'+fmt(l.amount)+'</td>'+
      '<td style="border:1px solid #555;padding:2px 4px">'+l.name+'</td>'+
      '<td style="border:1px solid #555;padding:2px 4px;text-align:center">'+l.qty+'</td>'+
      '</tr>';
  });
  for(var i=lines.length; i<TOTAL_ROWS; i++){
    itemRows += '<tr style="height:17px">'+
      '<td style="border:1px solid #555">&nbsp;</td>'+
      '<td style="border:1px solid #555"></td>'+
      '<td style="border:1px solid #555"></td>'+
      '<td style="border:1px solid #555"></td>'+
      '<td style="border:1px solid #555"></td>'+
      '</tr>';
  }

  // サインは1つ：今すぐ精算→a.sign、後で精算→a.client_sign
  var signData = (a.sign && a.sign.startsWith('data:')) ? a.sign
               : (a.client_sign && a.client_sign.startsWith('data:')) ? a.client_sign
               : null;
  var signEl = signData
    ? '<img src="'+signData+'" style="height:42px;max-width:200px;object-fit:contain;display:inline-block;vertical-align:middle"/>'
    : '';

  return (
    '<div style="position:relative;padding:0;font-size:11px;line-height:1.4;color:#000;font-family:\'Noto Sans JP\',sans-serif">'+

    // タイトル
    '<div style="text-align:center;font-size:16px;font-weight:700;letter-spacing:6px;margin-bottom:5px">《 精　算　書 》</div>'+

    // 宛先
    '<div style="font-size:11px;margin-bottom:2px">イソベ石油株式会社　御中</div>'+

    // 期間（取引日〜月日）
    '<div style="font-size:11px;margin-bottom:5px;border-bottom:1px solid #000;padding-bottom:2px">'+
      '<span style="font-size:13px;font-weight:700">'+
      (function(){var d=new Date(dateStr);return d.getMonth()+1;})()+
      '月'+
      (function(){var d=new Date(dateStr);return d.getDate();})()+
      '日</span>'+
      '　〜　　　月　　　日'+
    '</div>'+

    // 明細テーブル（勘定科目列追加）
    '<table style="width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:5px;table-layout:fixed">'+
      '<colgroup>'+
        '<col style="width:52px"/>'+   // 取引日
        '<col style="width:64px"/>'+   // 勘定科目
        '<col style="width:60px"/>'+   // 金額
        '<col/>'+                      // 内訳
        '<col style="width:30px"/>'+   // 枚数
      '</colgroup>'+
      '<thead><tr style="background:#fff">'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">取引日</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">勘定科目</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">金　額</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">内　訳</th>'+
        '<th style="border:1px solid #555;padding:3px 4px;text-align:center">枚数</th>'+
      '</tr></thead>'+
      '<tbody>'+itemRows+'</tbody>'+
      '<tfoot><tr>'+
        '<td colspan="4" style="border:1px solid #555;padding:4px 8px;font-weight:700;font-size:12px">合計金額　¥　'+fmt(a.total)+'</td>'+
        '<td style="border:1px solid #555"></td>'+
      '</tr></tfoot>'+
    '</table>'+

    // 日付・受領文
    '<div style="text-align:center;font-size:11px;margin-bottom:2px">'+toReiwa(dateStr)+'</div>'+
    '<div style="font-size:11px;margin-bottom:5px">上記合計金額正に受領いたしました。</div>'+

    // 精算者氏名＋サイン（横並び、画像のレイアウトに合わせる）
    '<div style="display:flex;align-items:flex-end;gap:8px">'+
      '<div style="font-size:11px;white-space:nowrap">精算者氏名</div>'+
      '<div style="border-bottom:1.5px solid #000;min-width:160px;padding-bottom:2px;display:flex;align-items:flex-end">'+
        (signEl ? signEl : '<span style="font-size:13px;font-weight:700">'+a.person+'</span>')+
      '</div>'+
    '</div>'+

    '<div style="position:absolute;bottom:2px;right:8px;font-size:9px;color:#aaa">'+a.id+'</div>'+
    '</div>'
  );
}

    });
    // 精算完了の申請行

  }

  $e('mb').innerHTML=
    '<div class="banner" style="margin-bottom:16px">'+
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:2px">合計金額</div>'+
    '<div style="font-size:24px;font-weight:700">¥'+fmt(a.total)+'</div>'+
    '<div style="font-size:11px;color:#9ca3af;margin-top:4px">精算日：<b style="color:#fff">'+(a.settlement_date?fmtDateJP(a.settlement_date):'未精算')+'</b></div>'+
    '</div>'+
    '<div class="idb"><div style="font-size:11px;color:#9ca3af;margin-bottom:6px">申請ID</div><div style="font-size:18px;font-weight:700;letter-spacing:2px">'+a.id+'</div></div>'+
    '<div style="margin-bottom:12px;text-align:center">'+stLabel(a.status)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">'+
    '<div><span style="color:#9ca3af">申請者</span><br><b>'+a.person+'</b></div>'+
    '<div><span style="color:#9ca3af">申請日</span><br><b>'+fmtDateJP(a.date)+'</b></div>'+
    '</div><hr/>'+
    receiptDetail+
    (a.sign&&a.sign.startsWith('data:')
      ?'<hr/><div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:8px">電子サイン（申請者）</div><img src="'+a.sign+'" style="border:1px solid #e5e7eb;border-radius:8px;width:100%;max-height:100px;object-fit:contain"/>'
      :'')+
    signSection;

  $e('ov').style.display='block';

  var paybtn=$e('paybtn');
  if(paybtn){
    paybtn.onclick=function(){
      if(paybtn.disabled)return;
      a.status='paid';
      a.paid_at=new Date().toISOString();
      sv();
      updateSheet(a.id, {status:'paid'});
      clsM();renderAdminList();
      alert('精算完了しました');
    };
  }

  if(!a.client_sign&&!isPaid(a)){
    var cv=$e('ccvs');
    if(cv){
      cv.width=cv.parentElement.offsetWidth-32;
      var csigned=false,cdr=false;
      var ctx=cv.getContext('2d');
      ctx.strokeStyle='#1c1917';ctx.lineWidth=2;ctx.lineCap='round';
      function cxy(e){var r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
      cv.onmousedown=cv.ontouchstart=function(e){e.preventDefault();cdr=true;var p=cxy(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
      cv.onmousemove=cv.ontouchmove=function(e){e.preventDefault();if(!cdr)return;var p=cxy(e);ctx.lineTo(p.x,p.y);ctx.stroke();csigned=true;$e('csl').style.display='inline';};
      cv.onmouseup=cv.ontouchend=function(){cdr=false;};
      $e('cclr').onclick=function(){ctx.clearRect(0,0,cv.width,cv.height);csigned=false;$e('csl').style.display='none';};
      $e('savesignbtn').onclick=function(){
        if(!csigned){alert('署名を記入してください');return;}
        var now=new Date();
        a.client_sign=cv.toDataURL();
        a.client_signed_at=now.toLocaleString('ja-JP');
        a.settlement_date=now.toISOString().slice(0,10);
        a.status='signed';
        sv();
        updateSheet(a.id, {status:'signed', settlement_date:a.settlement_date, client_sign:a.client_sign, client_signed_at:a.client_signed_at});
        clsM();shD(id);renderAdminList();
      };
    }
  }
}

function clsM(){$e('ov').style.display='none';}

function openCloseModal(){
  var b = calcBalance();
  $e('cm-carry').textContent = '¥'+fmt(CARRYOVER);
  $e('cm-dep').textContent = '¥'+fmt(b.depositSum);
  $e('cm-exp').textContent = '¥'+fmt(b.expenseSum);
  $e('cm-bal').textContent = '¥'+fmt(b.balance);
  $e('cm-bal').style.color = b.balance >= 0 ? '#16a34a' : '#dc2626';
  // 対象月を前月にデフォルト設定
  var now = new Date();
  var y = now.getMonth()===0 ? now.getFullYear()-1 : now.getFullYear();
  var m = now.getMonth()===0 ? 12 : now.getMonth();
  $e('close-month').value = y+'-'+('0'+m).slice(-2);
  $e('close-step1').style.display='block';
  $e('close-step2').style.display='none';
  $e('close-ov').style.display='block';
}

function closeCloseModal(){
  $e('close-ov').style.display='none';
}

function execClose(){
  var month = $e('close-month').value;
  if(!month){alert('対象月を選択してください');return;}
  var b = calcBalance();
  var newCarryover = b.balance;

  // GASに締め処理を送信
  fetch(GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      action:'monthClose',
      month: month,
      carryover: CARRYOVER,
      depositSum: b.depositSum,
      expenseSum: b.expenseSum,
      newCarryover: newCarryover,
      apps: APPS.map(function(a){return {id:a.id,date:a.date,person:a.person,store:a.store,total:a.total,status:a.status,settlement_date:a.settlement_date};}),
      deposits: DEPOSITS
    })
  }).catch(function(){});

  // 繰越額を新残高に更新
  CARRYOVER = newCarryover;
  localStorage.setItem('carryover', String(CARRYOVER));

  // 締め処理日時を記録（これ以前のGASデータは再読み込みしない）
  var closeAt = new Date().toISOString();
  localStorage.setItem('last_close_at', closeAt);

  // 申請・入金履歴をリセット
  APPS = [];
  DEPOSITS = [];
  sv();
  localStorage.setItem('deposits','[]');

  // 完了表示
  $e('close-step1').style.display='none';
  $e('close-step2').style.display='block';
  $e('close-done-msg').textContent =
    month.replace('-','年')+'月 の締めが完了しました。\n次月繰越額：¥'+fmt(newCarryover);

  // UIを更新
  setTimeout(function(){
    renderAdminList();
  }, 300);
}

function dlCSV(){
  // 入出金明細形式：日付・申請者・内容・金額（総額）・精算ステータス
  function esc(v){var s=String(v==null?'':v);return(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;}
  function stJa(s){
    if(s==='paid'||s==='精算済') return '精算完了';
    if(s==='signed') return 'サイン済（未精算）';
    return '未精算';
  }
  // 日付を M/D 形式に変換（例：2025-05-23 → 5/23）
  function fmtDate(dateStr){
    if(!dateStr) return '';
    try{
      var d = new Date(dateStr);
      if(isNaN(d.getTime())) return dateStr;
      return (d.getMonth()+1)+'/'+(d.getDate());
    }catch(e){return dateStr;}
  }

  var rows = [['日付','申請者','内容','金額（総額）','精算ステータス']];

  // 申請データ（申請単位・総額）
  APPS.forEach(function(a){
    var csvDate = fmtDate(a.settlement_date || a.date);
    var rcptCount = a.receipts ? a.receipts.length : 1;
    rows.push([csvDate, a.person, rcptCount+'件レシート精算', a.total, stJa(a.status)]);
  });

  // 入金データ
  DEPOSITS.forEach(function(d){
    rows.push([fmtDate(d.date), '－', '入金'+(d.memo?'（'+d.memo+'）':''), d.amount, '－']);
  });

  // 日付昇順ソート（ヘッダー除く）
  var header = rows.shift();
  rows.sort(function(a,b){ return String(a[0]).localeCompare(String(b[0])); });
  rows.unshift(header);

  if(rows.length <= 1){alert('出力するデータがありません');return;}
  var csv = '\uFEFF' + rows.map(function(r){return r.map(esc).join(',');}).join('\n');
  var link = document.createElement('a');
  link.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  link.download = '入出金明細_'+today()+'.csv';
  link.click();
}

showUpload();
