<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>現金精算</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;font-size:14px}
nav{background:#1c1917;color:#fff;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;padding:14px 0;margin-right:16px}
.tab{padding:14px 12px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af}
.tab.on{color:#fff;border-bottom-color:#16a34a}
.wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct{font-size:15px;font-weight:700;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
.bg{background:#16a34a;color:#fff}
.bw{background:#f3f4f6;color:#374151}
.bd{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.upload{border:2px dashed #d1d5db;border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer}
.irow{background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:8px}
.ttag{background:#dbeafe;color:#2563eb;border-radius:4px;padding:2px 8px;font-size:11px;display:inline-block;margin-bottom:6px}
.mwrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtn{padding:14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.mn{border-color:#16a34a;background:#f0fdf4;color:#16a34a}
.ml{border-color:#d97706;background:#fffbeb;color:#d97706}
.tbox{background:#f9fafb;border-radius:8px;padding:12px;margin-top:8px}
.tr{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.crow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.idb{background:#1c1917;color:#fff;border-radius:10px;padding:16px;text-align:center;margin-bottom:16px}
.st-paid{background:#dcfce7;color:#16a34a;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.st-signed{background:#dbeafe;color:#2563eb;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.st-unsigned{background:#fef3c7;color:#d97706;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:20px}
.md{background:#fff;border-radius:16px;max-width:560px;margin:0 auto;padding:24px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#f3f4f6;padding:8px;text-align:left;border:1px solid #e5e7eb;font-weight:600}
.tbl td{padding:8px;border:1px solid #e5e7eb}
hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0}
.spin{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.next{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:24px;text-align:center}
.sign-box{border:2px solid #e5e7eb;border-radius:8px;padding:16px;margin-top:12px;background:#f9fafb}
.banner{background:#1c1917;color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.rbadge{background:#2563eb;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>
<nav>
  <div class="logo">💴 現金精算</div>
  <div class="tab on" id="t1">申請</div>
  <div style="margin-left:auto;padding:14px 4px">
    <span onclick="askAdminPassword()" style="font-size:10px;color:#4b5563;cursor:pointer;user-select:none;padding:4px 8px">管理</span>
  </div>
</nav>

<!-- 管理画面 -->
<div id="admin-ov" style="display:none;position:fixed;inset:0;background:#f0f4f8;z-index:300;overflow-y:auto">
  <div style="background:#1c1917;color:#fff;padding:0 16px;display:flex;align-items:center;position:sticky;top:0">
    <div style="font-size:15px;font-weight:700;padding:14px 0">💴 管理画面</div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button onclick="doMonthClose()" style="background:#d97706;border:none;border-radius:6px;color:#fff;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit">月次締め</button>
      <button onclick="closeAdmin()" style="background:none;border:1px solid #4b5563;border-radius:6px;color:#9ca3af;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit">閉じる</button>
    </div>
  </div>
  <!-- ログイン画面 -->
  <div id="admin-login" style="display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px">
    <div style="background:#fff;border-radius:16px;padding:32px;width:90%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center">
      <div style="font-size:32px;margin-bottom:12px">🔐</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">管理者ログイン</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:20px">パスワードを入力してください</div>
      <input type="password" id="admin-pw-input" placeholder="パスワード"
        style="width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:8px;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:8px"
        onkeydown="if(event.key==='Enter')doAdminLogin()"/>
      <div id="admin-pw-err" style="color:#dc2626;font-size:12px;margin-bottom:8px;display:none">パスワードが違います</div>
      <button onclick="doAdminLogin()" style="width:100%;padding:14px;background:#1c1917;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">ログイン</button>
    </div>
  </div>
  <!-- 管理コンテンツ -->
  <div id="admin-main" style="display:none;max-width:800px;margin:0 auto;padding:20px 16px 80px">
    <div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:8px">精算者で絞り込み</div>
      <select id="admin-filter" onchange="renderAdmin()" style="width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none">
        <option value="">すべて</option>
        <option>田中</option><option>佐藤</option><option>大橋</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">総件数</div>
        <div style="font-size:20px;font-weight:700" id="adm-count">0</div>
      </div>
      <div style="background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">総支出</div>
        <div style="font-size:16px;font-weight:700;color:#dc2626" id="adm-amt">¥0</div>
      </div>
      <div style="background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px">未精算</div>
        <div style="font-size:20px;font-weight:700;color:#d97706" id="adm-pending">0</div>
      </div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px">申請履歴（新しい順）</div>
      <div id="admin-list"></div>
    </div>
  </div>
</div>

<div id="pg1" class="wrap"><div id="area"></div></div>

<div class="ov" id="ov" onclick="if(event.target===this)clsM()">
  <div class="md">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:17px;font-weight:700">申請詳細</span>
      <button onclick="clsM()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280">✕</button>
    </div>
    <div id="mb"></div>
  </div>
</div>

<script>
var APPS = JSON.parse(localStorage.getItem('apps')||'[]');
var CARRY_OVER = JSON.parse(localStorage.getItem('carry_over')||'{"amount":0,"date":""}');
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxO3asjRqUMyXX8UJYEsJDQHA3az43FLhplI2OSV9EXSQzMBZzHlLkAqrBBUh6j4YdQbA/exec';
var ACS = ['会議費','交際費','旅費交通費','消耗品費','事務用品費','通信費','新聞図書費','厚生費','雑費'];
var AM = {'弁当':'会議費','サンドイッチ':'会議費','おにぎり':'会議費','お茶':'厚生費','コーヒー':'厚生費','飲料':'厚生費','ティッシュ':'消耗品費','洗剤':'消耗品費','ボールペン':'事務用品費','ノート':'事務用品費','電車':'旅費交通費','バス':'旅費交通費','タクシー':'旅費交通費','切手':'通信費','書籍':'新聞図書費'};

function gac(n){for(var k in AM)if(n.indexOf(k)>=0)return AM[k];return '雑費';}
function gid(){var d=new Date();return 'CS-'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+'-'+('000000'+(APPS.length+1)).slice(-6);}
function sv(){localStorage.setItem('apps',JSON.stringify(APPS));}
function svWithGAS(app){APPS.push(app);sv();saveToGAS(app);}
function $e(id){return document.getElementById(id);}
function today(){return new Date().toISOString().slice(0,10);}
function fmt(v){return Number(v||0).toLocaleString();}
function stLabel(s){
  if(s==='paid'||s==='精算済') return '<span class="st-paid">精算完了</span>';
  if(s==='signed') return '<span class="st-signed">サイン済（未精算）</span>';
  return '<span class="st-unsigned">未精算</span>';
}
function isPaid(a){return a.status==='paid'||a.status==='精算済';}

// 画像圧縮（幅800px以内、品質0.7）
function compressImage(b64, mime, callback){
  var img = new Image();
  img.onload = function(){
    var maxW = 800;
    var w = img.width, h = img.height;
    if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var compressed = canvas.toDataURL('image/jpeg', 0.7);
    callback(compressed.split(',')[1], 'image/jpeg');
  };
  img.src = 'data:'+mime+';base64,'+b64;
}

function saveToGAS(app){
  var data = JSON.parse(JSON.stringify(app));
  if(data.receipts) data.receipts = data.receipts.map(function(r){return Object.assign({},r,{b64:null});});
  data.img = null;
  data.sign = null;
  data.client_sign = null;
  data.action = 'save';
  fetch(GAS_URL, {method:'POST', body:JSON.stringify(data)}).catch(function(){});
}

function updateToGAS(id, updates){
  var data = Object.assign({action:'update', id:id}, updates);
  fetch(GAS_URL, {method:'POST', body:JSON.stringify(data)}).catch(function(){});
}

var RECEIPTS = [];
var CURRENT_PERSON = '';

function showUpload(){
  RECEIPTS = [];
  var el = $e('area');
  el.innerHTML = '';
  var card = document.createElement('div');
  card.className = 'card';
  var title = document.createElement('div');
  title.className = 'ct';
  title.textContent = 'レシートをアップロード';
  card.appendChild(title);
  var lbl = document.createElement('label');
  lbl.style.marginTop = '0';
  lbl.textContent = '精算者を選択してください';
  card.appendChild(lbl);
  var sel = document.createElement('select');
  sel.id = 'up-person';
  sel.innerHTML = '<option value="">-- 選択してください --</option><option>田中</option><option>佐藤</option><option>大橋</option>';
  card.appendChild(sel);
  var msg = document.createElement('div');
  msg.style.cssText = 'background:#fef3c7;border-radius:8px;padding:12px;text-align:center;font-size:13px;color:#d97706;margin-top:12px';
  msg.textContent = '👆 まず精算者を選択してください';
  card.appendChild(msg);
  var uploadArea = document.createElement('div');
  uploadArea.style.display = 'none';
  var uz = document.createElement('div');
  uz.className = 'upload';
  uz.style.marginTop = '12px';
  uz.innerHTML = '<div style="font-size:40px;margin-bottom:10px">🧾</div><div style="font-weight:700;font-size:15px;margin-bottom:4px">タップして選択（複数可）</div><div style="font-size:12px;color:#9ca3af">JPG・PNG・HEIC　複数枚同時選択OK</div>';
  uploadArea.appendChild(uz);
  var thumbs = document.createElement('div');
  thumbs.id = 'thumbs';
  thumbs.style.cssText = 'display:none;flex-wrap:wrap;gap:8px;margin-top:12px';
  uploadArea.appendChild(thumbs);
  var addBtn = document.createElement('button');
  addBtn.id = 'add-btn';
  addBtn.className = 'btn bw';
  addBtn.style.display = 'none';
  addBtn.textContent = '＋ レシートを追加する';
  uploadArea.appendChild(addBtn);
  var analyzeBtn = document.createElement('button');
  analyzeBtn.id = 'analyze-btn';
  analyzeBtn.className = 'btn bg';
  analyzeBtn.style.display = 'none';
  analyzeBtn.textContent = 'すべて解析する →';
  uploadArea.appendChild(analyzeBtn);
  card.appendChild(uploadArea);
  el.appendChild(card);
  window.scrollTo(0,0);
  sel.onchange = function(){
    var val = sel.value;
    CURRENT_PERSON = val;
    uploadArea.style.display = val ? 'block' : 'none';
    msg.style.display = val ? 'none' : 'block';
    if(val && !uz._bound){
      uz._bound = true;
      var fi = document.createElement('input');
      fi.type='file'; fi.accept='image/*'; fi.multiple=true; fi.style.display='none';
      document.body.appendChild(fi);
      uz.onclick = function(){fi.click();};
      fi.onchange = function(){addFiles(fi.files); fi.remove();};
      addBtn.onclick = function(){
        var fi2=document.createElement('input');
        fi2.type='file'; fi2.accept='image/*'; fi2.multiple=true; fi2.style.display='none';
        document.body.appendChild(fi2);
        fi2.onchange=function(){addFiles(fi2.files); fi2.remove();};
        fi2.click();
      };
      analyzeBtn.onclick = function(){analyzeAll();};
    }
  };
}

function addFiles(files){
  Array.prototype.forEach.call(files, function(f){
    if(!f.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var b64raw = e.target.result.split(',')[1];
      var mime = f.type;
      // 圧縮してから追加
      compressImage(b64raw, mime, function(b64c, mimeC){
        RECEIPTS.push({b64:b64c, mime:mimeC, preview:'data:'+mimeC+';base64,'+b64c, data:null});
        renderThumbs();
      });
    };
    reader.readAsDataURL(f);
  });
}

function renderThumbs(){
  var el = $e('thumbs'); if(!el) return;
  el.style.display = 'flex';
  el.innerHTML = RECEIPTS.map(function(r,i){
    return '<div style="position:relative"><img src="'+r.preview+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid '+(r.data?'#16a34a':'#d1d5db')+'"/>'+(r.data?'<div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;background:#16a34a;color:#fff;font-size:9px;border-radius:0 0 6px 6px;padding:1px">解析済</div>':'')+'<button onclick="removeR('+i+')" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;border:none;cursor:pointer;font-size:10px;line-height:18px;padding:0">✕</button></div>';
  }).join('');
  $e('add-btn').style.display = 'block';
  $e('analyze-btn').style.display = RECEIPTS.length ? 'block' : 'none';
}

function removeR(i){ RECEIPTS.splice(i,1); renderThumbs(); }
function removeFormR(i){ RECEIPTS.splice(i,1); if(!RECEIPTS.length){showUpload();}else{showAllForms(CURRENT_PERSON);} }

function analyzeAll(){
  if(!RECEIPTS.length) return;
  $e('area').innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6b7280"><div class="spin"></div><div id="prog">解析中... (0/'+RECEIPTS.length+')</div></div>';
  function next(i){
    if(i>=RECEIPTS.length){ showAllForms(CURRENT_PERSON); return; }
    var prog=$e('prog'); if(prog) prog.textContent='解析中... ('+(i+1)+'/'+RECEIPTS.length+')';
    var r=RECEIPTS[i];
    fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:r.b64,mimeType:r.mime})})
    .then(function(res){if(!res.ok)return res.json().then(function(e){throw new Error(e.error||res.status);});return res.json();})
    .then(function(d){r.data=d;next(i+1);})
    .catch(function(){
      r.data={store_name:'サンプル商店'+(i+1),date:today(),invoice_number:'',
        items:[{name:'商品'+(i+1),amount:500*(i+1),tax_category:'10%標準'}],
        tax_8:0,tax_10:Math.floor(50*(i+1)),total:500*(i+1)};
      next(i+1);
    });
  }
  next(0);
}

function showAllForms(person){
  var grandTotal = RECEIPTS.reduce(function(s,r){return s+(r.data?r.data.total||0:0);},0);
  var el = $e('area');
  el.innerHTML = '';
  // 総額バナー
  var banner = document.createElement('div');
  banner.className = 'banner';
  banner.innerHTML =
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:2px">全レシート合計</div>'+
    '<div style="font-size:28px;font-weight:700">¥'+fmt(grandTotal)+'</div>'+
    '<div style="font-size:12px;color:#9ca3af;margin-top:4px">精算日：<b style="color:#fff">署名時に自動記録されます</b></div>';
  el.appendChild(banner);
  // 戻るボタン
  var backBtn = document.createElement('button');
  backBtn.className = 'btn bw';
  backBtn.textContent = '← 最初に戻る';
  backBtn.style.marginBottom = '8px';
  backBtn.onclick = function(){showUpload();};
  el.appendChild(backBtn);
  // 精算者カード
  var personCard = document.createElement('div');
  personCard.className = 'card';
  personCard.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#6b7280;font-weight:600">精算者</span><span style="font-weight:700;font-size:15px">'+person+'</span></div>';
  el.appendChild(personCard);
  // サムネイル
  var thumbCard = document.createElement('div');
  thumbCard.className = 'card';
  thumbCard.innerHTML = '<div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:10px">添付レシート（'+RECEIPTS.length+'枚）</div>';
  var thumbRow = document.createElement('div');
  thumbRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px';
  RECEIPTS.forEach(function(r,i){
    var wrap = document.createElement('div');
    wrap.style.position = 'relative';
    wrap.innerHTML = '<img src="'+r.preview+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid #16a34a"/><button onclick="removeFormR('+i+')" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;border:none;cursor:pointer;font-size:10px;line-height:18px;padding:0">✕</button>';
    thumbRow.appendChild(wrap);
  });
  thumbCard.appendChild(thumbRow);
  el.appendChild(thumbCard);
  // 各レシートカード
  RECEIPTS.forEach(function(r,ri){
    var d = r.data || {};
    var card = document.createElement('div');
    card.className = 'card';
    var badge = document.createElement('div');
    badge.className = 'rbadge';
    badge.textContent = 'レシート '+(ri+1);
    card.appendChild(badge);
    var img = document.createElement('img');
    img.src = r.preview;
    img.style.cssText = 'width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:12px';
    card.appendChild(img);
    function addField(labelText, inputId, type, value){
      var lbl = document.createElement('label'); lbl.textContent = labelText; card.appendChild(lbl);
      var inp = document.createElement('input'); inp.type=type||'text'; inp.id=inputId; inp.value=value||'';
      if(inputId.endsWith('inv')) inp.placeholder='T123456789012';
      card.appendChild(inp);
    }
    addField('支払先','r'+ri+'store','text',d.store_name||'');
    addField('日付','r'+ri+'date','date',d.date||today());
    addField('インボイス番号','r'+ri+'inv','text',d.invoice_number||'');

      function cxy(e){var r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
      cv.onmousedown=cv.ontouchstart=function(e){e.preventDefault();cdr=true;var p=cxy(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
      cv.onmousemove=cv.ontouchmove=function(e){e.preventDefault();if(!cdr)return;var p=cxy(e);ctx.lineTo(p.x,p.y);ctx.stroke();csigned=true;$e('adm-sl').style.display='inline';};
      cv.onmouseup=cv.ontouchend=function(){cdr=false;};
      $e('adm-clr').onclick=function(){ctx.clearRect(0,0,cv.width,cv.height);csigned=false;$e('adm-sl').style.display='none';};
      $e('adm-savesign').onclick=function(){
        if(!csigned){alert('署名を記入してください');return;}
        var now=new Date();
        a.client_sign=cv.toDataURL();
        a.client_signed_at=now.toLocaleString('ja-JP');
        a.settlement_date=now.toISOString().slice(0,10);
        a.status='signed';
        sv(); updateToGAS(a.id,{status:'signed',settlement_date:a.settlement_date,client_sign:true,client_signed_at:a.client_signed_at});
        clsM(); renderAdmin(); showAdminDetail(id);
      };
    }
  }
}

function clsM(){$e('ov').style.display='none';}

// ===== 月次締め処理 =====
function doMonthClose(){
  if(!confirm('月次締め処理を実行しますか？\nアプリ上の申請履歴はリセットされます。\nスプレッドシートの記録は残ります。')) return;
  var total = APPS.reduce(function(s,a){return s+(a.total||0);},0);
  var now = new Date();
  var monthLabel = now.getFullYear()+'年'+(now.getMonth()+1)+'月';
  // 繰越額をGASに送信
  var carryData = {
    action:'monthClose',
    month:monthLabel,
    total:total,
    carry_over:CARRY_OVER.amount,
    date:today()
  };
  fetch(GAS_URL,{method:'POST',body:JSON.stringify(carryData)}).catch(function(){});
  // 繰越額更新
  CARRY_OVER = {amount:0, date:today(), month:monthLabel};
  localStorage.setItem('carry_over',JSON.stringify(CARRY_OVER));
  // アプリ上の履歴リセット
  APPS = [];
  sv();
  renderAdmin();
  alert(monthLabel+'の締め処理が完了しました。\n申請履歴をリセットしました。');
}
