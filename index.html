<!DOCTYPE html>
<html lang="ja">
<head>

<title>現金精算</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;font-size:14px}
nav{background:#1c1917;color:#fff;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100}

.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ct{font-size:15px;font-weight:700;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
.bg{background:#16a34a;color:#fff}
.bw{background:#f3f4f6;color:#374151}
.bd{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.upload{border:2px dashed #d1d5db;border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer}
.irow{background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:8px}
.ttag{background:#dbeafe;color:#2563eb;border-radius:4px;padding:2px 8px;font-size:11px;display:inline-block;margin-bottom:6px}
.mwrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtn{padding:14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.mn{border-color:#16a34a;background:#f0fdf4;color:#16a34a}
.ml{border-color:#d97706;background:#fffbeb;color:#d97706}
.tbox{background:#f9fafb;border-radius:8px;padding:12px;margin-top:8px}
.tr{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.crow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.idb{background:#1c1917;color:#fff;border-radius:10px;padding:16px;text-align:center;margin-bottom:16px}
.li{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.st-paid{background:#dcfce7;color:#16a34a;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.st-signed{background:#dbeafe;color:#2563eb;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.st-unsigned{background:#fef3c7;color:#d97706;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sc{background:#fff;border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:20px}
.md{background:#fff;border-radius:16px;max-width:560px;margin:0 auto;padding:24px}

hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0}
.spin{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.next{background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:24px;text-align:center}
.sign-box{border:2px solid #e5e7eb;border-radius:8px;padding:16px;margin-top:12px;background:#f9fafb}
.banner{background:#1c1917;color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px}

/* パスワードモーダル */

/* 管理画面フィルター */

@media print {

  #print-sheet {
    display: block !important;
    font-family: 'Noto Sans JP', sans-serif;

    color: #000;
  }
}
</style>
</head>

<script>
var APPS = JSON.parse(localStorage.getItem('apps')||'[]');
var DEPOSITS = JSON.parse(localStorage.getItem('deposits')||'[]');
var CARRYOVER = 100000; // 前月繰越（固定・10万円）
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwZm8azHu8SVFb2mO6MjSl-NqOBkOd4WrUPqOXQwUAIk7YtNnLqazMVq0H5Hravr0w_3g/exec';

// ---- パスワード設定（ここを変更してください） ----
var ADMIN_PASSWORD = '1234';
// -------------------------------------------------

var ADMIN_MODE = false;
var CURRENT_FILTER = 'all';

function tryAdmin(){
  if(ADMIN_MODE){ showTab(2); return; }
  document.getElementById('pw-ov').classList.add('active');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').textContent='';
  setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
}

document.getElementById('pw-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkPw();
});

function checkPw(){
  var val = document.getElementById('pw-input').value;
  if(val === ADMIN_PASSWORD){
    closePw();
    enterAdmin();
  } else {
    document.getElementById('pw-err').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function closePw(){
  document.getElementById('pw-ov').classList.remove('active');
}

function enterAdmin(){
  ADMIN_MODE = true;
  var t2 = document.getElementById('t2');
  t2.style.display = 'block';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = 'ログアウト';
  btn.style.color = '#16a34a';
  btn.style.borderColor = '#16a34a';
  btn.onclick = logoutAdmin;
  showTab(2);
}

function logoutAdmin(){
  ADMIN_MODE = false;
  var t2 = document.getElementById('t2');
  t2.style.display = 'none';
  var btn = document.getElementById('admin-toggle-btn');
  btn.textContent = '管理';
  btn.style.color = '#9ca3af';
  btn.style.borderColor = '#4b5563';
  btn.onclick = tryAdmin;
  showTab(1);
}

// スプレッドシートに保存
function saveToSheet(app) {
  var data = Object.assign({action:'save'}, app);
  delete data.img;
  if(data.receipts) data.receipts = data.receipts.map(function(r){
    var r2 = Object.assign({},r); delete r2.b64; return r2;
  });
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet save error:', e);});
}

function updateSheet(id, updates) {
  var data = Object.assign({action:'update', id:id}, updates);
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  }).catch(function(e){console.log('Sheet update error:', e);});
}

function loadFromSheet(cb) {
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'load'})
  })
  .then(function(r){return r.json();})
  .then(function(d){if(d.ok) cb(d.data);})
  .catch(function(e){console.log('Sheet load error:', e); cb(null);});
}

var ACS = ['会議費','交際費','旅費交通費','消耗品費','事務用品費','通信費','新聞図書費','厚生費','雑費'];
var AM = {'弁当':'会議費','サンドイッチ':'会議費','おにぎり':'会議費','お茶':'厚生費','コーヒー':'厚生費','飲料':'厚生費','ティッシュ':'消耗品費','洗剤':'消耗品費','ボールペン':'事務用品費','ノート':'事務用品費','電車':'旅費交通費','バス':'旅費交通費','タクシー':'旅費交通費','切手':'通信費','書籍':'新聞図書費'};
function gac(n){for(var k in AM)if(n.indexOf(k)>=0)return AM[k];return '雑費';}
function gid(){var d=new Date();return 'CS-'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+'-'+('000000'+(APPS.length+1)).slice(-6);}
function sv(){localStorage.setItem('apps',JSON.stringify(APPS));}
function $e(id){return document.getElementById(id);}
function today(){return new Date().toISOString().slice(0,10);}
function fmt(v){return Number(v||0).toLocaleString();}

function stLabel(s){
  if(s==='paid'||s==='精算済') return '<span class="st-paid">精算完了</span>';
  if(s==='signed') return '<span class="st-signed">サイン済（未精算）</span>';
  return '<span class="st-unsigned">未精算</span>';
}
function isPaid(a){return a.status==='paid'||a.status==='精算済';}

function showTab(n){
  for(var i=1;i<=2;i++){
    var pg=$e('pg'+i); if(pg) pg.style.display = i===n?'block':'none';
    var t=$e('t'+i); if(t) t.className = i===n?'tab on':'tab';
  }
  if(n===2) rA();
}

function setFilter(f){
  CURRENT_FILTER = f;
  ['all','unsigned','paid','ledger'].forEach(function(k){
    var el=$e('f-'+k);
    if(el) el.className = k===f?'fbtn on':'fbtn';
  });
  renderAdminList();
}

var RECEIPTS = [];
var CURRENT_PERSON = '';

function showUpload(){
  RECEIPTS = [];
  var el = $e('area');
  el.innerHTML = '';

  var card = document.createElement('div');
  card.className = 'card';

  var title = document.createElement('div');
  title.className = 'ct';
  title.textContent = 'レシートをアップロード';
  card.appendChild(title);

  var lbl = document.createElement('label');
  lbl.style.marginTop = '0';
  lbl.textContent = '精算者を選択してください';
  card.appendChild(lbl);

  var sel = document.createElement('select');
  sel.id = 'up-person';
  sel.innerHTML = '<option value="">-- 選択してください --</option><option>田中</option><option>佐藤</option><option>大橋</option>';
  card.appendChild(sel);

  var msg = document.createElement('div');
  msg.id = 'select-msg';
  msg.style.cssText = 'background:#fef3c7;border-radius:8px;padding:12px;text-align:center;font-size:13px;color:#d97706;margin-top:12px';
  msg.textContent = '👆 まず精算者を選択してください';
  card.appendChild(msg);

  var uploadArea = document.createElement('div');
  uploadArea.id = 'upload-area';
  uploadArea.style.display = 'none';

  var uz = document.createElement('div');
  uz.id = 'uz';
  uz.className = 'upload';
  uz.style.marginTop = '12px';
  uz.innerHTML =
    '<div style="font-size:40px;margin-bottom:10px">🧾</div>' +
    '<div style="font-weight:700;font-size:15px;margin-bottom:4px">タップして選択（複数可）</div>' +
    '<div style="font-size:12px;color:#9ca3af">JPG・PNG・HEIC　複数枚同時選択OK</div>';
  uploadArea.appendChild(uz);

  var thumbs = document.createElement('div');
  thumbs.id = 'thumbs';
  thumbs.style.cssText = 'display:none;flex-wrap:wrap;gap:8px;margin-top:12px';
  uploadArea.appendChild(thumbs);

  var addBtn = document.createElement('button');

  addBtn.className = 'btn bw';
  addBtn.style.display = 'none';
  addBtn.textContent = '＋ レシートを追加する';
  uploadArea.appendChild(addBtn);

  var analyzeBtn = document.createElement('button');
  analyzeBtn.id = 'analyze-btn';
  analyzeBtn.className = 'btn bg';
  analyzeBtn.style.display = 'none';
  analyzeBtn.textContent = 'すべて解析する →';
  uploadArea.appendChild(analyzeBtn);

  card.appendChild(uploadArea);
  el.appendChild(card);
  window.scrollTo(0,0);

  sel.onchange = function(){
    var val = sel.value;
    uploadArea.style.display = val ? 'block' : 'none';
    msg.style.display = val ? 'none' : 'block';
    if(val && !uz._bound){
      uz._bound = true;
      var fi = document.createElement('input');
      fi.type='file'; fi.accept='image/*'; fi.multiple=true; fi.style.display='none';
      document.body.appendChild(fi);
      uz.onclick = function(){fi.click();};
      fi.onchange = function(){addFiles(fi.files); fi.remove();};
      addBtn.onclick = function(){
        var fi2=document.createElement('input');
        fi2.type='file'; fi2.accept='image/*'; fi2.multiple=true; fi2.style.display='none';
        document.body.appendChild(fi2);
        fi2.onchange=function(){addFiles(fi2.files); fi2.remove();};
        fi2.click();
      };
      analyzeBtn.onclick = function(){analyzeAll();};

function addFiles(files){
  Array.prototype.forEach.call(files, function(f){
    if(!f.type.startsWith('image/')) return;
    var r = new FileReader();
    r.onload = function(e){
      RECEIPTS.push({b64:e.target.result.split(',')[1], mime:f.type, preview:e.target.result, data:null});
      renderThumbs();
    };
    r.readAsDataURL(f);
  });
}

    var p=$e('prog'); if(p) p.textContent='解析中... ('+(i+1)+'/'+RECEIPTS.length+')';

function rA(){
  // 申請データをGASから取得
  loadFromSheet(function(sheetData){
    if(sheetData && sheetData.length > 0){
      sheetData.forEach(function(sd){
        var local = APPS.find(function(a){return a.id===sd.id;});
        if(local){
          local.status = sd.status || local.status;
          local.settlement_date = sd.settlement_date || local.settlement_date;
        } else {
          // スプレッドシートにあるがlocalStorageにない申請を追加
          APPS.push(sd);
        }
      });
      sv();
    }
    // 入金データをGASから取得
    fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'loadDeposits'})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok && d.data && d.data.length > 0){
        // GASのデータとlocalStorageをマージ（IDで重複排除）
        d.data.forEach(function(sd){
          var exists = DEPOSITS.find(function(dep){return dep.id===sd.id;});
          if(!exists) DEPOSITS.push(sd);
        });
        localStorage.setItem('deposits', JSON.stringify(DEPOSITS));
      }
      renderAdminList();
    })
    .catch(function(e){console.log('Deposit load error:', e); renderAdminList();});
  });
}

function calcBalance(){
  var depositSum = DEPOSITS.reduce(function(s,d){return s+(d.amount||0);},0);
  var expenseSum = APPS.filter(isPaid).reduce(function(s,a){return s+(a.total||0);},0);
  return {
    balance: CARRYOVER + depositSum - expenseSum,
    depositSum: depositSum,
    expenseSum: expenseSum
  };
}

  var b = calcBalance();
  var el = document.getElementById('balance-display');
  if(el){

  var el2 = document.getElementById('expense-total-label');

}

  document.getElementById('dep-conf-amount').textContent = '¥'+fmt(amt);
  document.getElementById('dep-step1').style.display='none';
  document.getElementById('dep-step2').style.display='block';
}

function backDepInput(){
  document.getElementById('dep-step1').style.display='block';
  document.getElementById('dep-step2').style.display='none';
}

function saveDeposit(){
  var dt = document.getElementById('dep-date').value;
  var memo = document.getElementById('dep-memo').value || '入金';
  var amt = parseInt(document.getElementById('dep-amount').value, 10);
  if(!dt||!amt||amt<=0) return;
  var dep = {id:'DEP-'+Date.now(), date:dt, memo:memo, amount:amt};
  DEPOSITS.push(dep);
  localStorage.setItem('deposits', JSON.stringify(DEPOSITS));
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(Object.assign({action:'saveDeposit'}, dep))
  }).catch(function(e){console.log('Deposit save error:', e);});
  closeDepositModal();
  updateBalanceUI();
  renderAdminList();
}

function closeDepositModal(){
  document.getElementById('deposit-ov').style.display = 'none';
}

// ---- 精算書印刷 ----
function buildSeisanshoHTML(a){
  function toReiwa(dateStr){
    if(!dateStr) return '';
    var d = new Date(dateStr);
    var reiwa = d.getFullYear() - 2018;
    return '令和 '+reiwa+'年 '+(d.getMonth()+1)+'月 '+d.getDate()+'日';
  }

  var dateStr = a.settlement_date || a.date || today();

  // 明細行：「勘定科目」→「取引日」、レシートの日付を表示
  var itemRows = '';
  var filledRows = 0;
  if(a.receipts && a.receipts.length > 0){
    a.receipts.forEach(function(r){
      var txDate = r.date || dateStr;
      // MM/DD 形式に整形
      var txLabel = (function(){
        try{var d=new Date(txDate);return (d.getMonth()+1)+'月'+d.getDate()+'日';}catch(e){return txDate;}
      })();
      (r.items||[]).forEach(function(it){
        itemRows +=
          '<tr>'+
          '<td style="border:1px solid #333;padding:5px 8px;text-align:center;white-space:nowrap">'+txLabel+'</td>'+
          '<td style="border:1px solid #333;padding:5px 8px;text-align:right;white-space:nowrap">'+fmt(it.amount)+'</td>'+
          '<td style="border:1px solid #333;padding:5px 8px">'+it.name+(r.store?' ('+r.store+')':'')+'</td>'+
          '<td style="border:1px solid #333;padding:5px 8px;text-align:center">1</td>'+
          '</tr>';
        filledRows++;
      });
    });
  } else {
    var fallbackDate = (function(){
      try{var d=new Date(dateStr);return (d.getMonth()+1)+'月'+d.getDate()+'日';}catch(e){return dateStr;}
    })();
    (a.items||[]).forEach(function(it){
      itemRows +=
        '<tr>'+
        '<td style="border:1px solid #333;padding:5px 8px;text-align:center;white-space:nowrap">'+fallbackDate+'</td>'+
        '<td style="border:1px solid #333;padding:5px 8px;text-align:right;white-space:nowrap">'+fmt(it.amount)+'</td>'+
        '<td style="border:1px solid #333;padding:5px 8px">'+it.name+'</td>'+
        '<td style="border:1px solid #333;padding:5px 8px;text-align:center">1</td>'+
        '</tr>';
      filledRows++;
    });
  }
  // 空行で最低8行
  for(var i=filledRows; i<8; i++){
    itemRows +=
      '<tr>'+
      '<td style="border:1px solid #333;padding:5px 8px">&nbsp;</td>'+
      '<td style="border:1px solid #333;padding:5px 8px"></td>'+
      '<td style="border:1px solid #333;padding:5px 8px"></td>'+
      '<td style="border:1px solid #333;padding:5px 8px"></td>'+
      '</tr>';
  }

  return (
    '<div style="position:relative;padding:32px 36px;font-size:13px;line-height:1.9;color:#000;font-family:\'Noto Sans JP\',sans-serif">'+

    // タイトル
    '<div style="text-align:center;font-size:20px;font-weight:700;letter-spacing:8px;margin-bottom:20px">《 精　算　書 》</div>'+

    // 宛先（固定）
    '<div style="font-size:13px;margin-bottom:6px">イソベ石油株式会社　御中</div>'+

    // 期間
    '<div style="font-size:13px;margin-bottom:16px">'+
      (function(){var d=new Date(dateStr);return (d.getMonth()+1)+'月'+d.getDate()+'日';})()+
      '　〜　月　　日'+
    '</div>'+

    // 明細テーブル（全セルにborderを指定、border-collapseで隙間なし）
    '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:24px;table-layout:fixed">'+
      '<colgroup>'+
        '<col style="width:90px"/>'+
        '<col style="width:80px"/>'+
        '<col/>'+
        '<col style="width:44px"/>'+
      '</colgroup>'+
      '<thead>'+
        '<tr>'+
          '<th style="border:1px solid #333;padding:6px 8px;text-align:center;font-weight:700;background:#fff">取引日</th>'+
          '<th style="border:1px solid #333;padding:6px 8px;text-align:center;font-weight:700;background:#fff">金　額</th>'+
          '<th style="border:1px solid #333;padding:6px 8px;text-align:center;font-weight:700;background:#fff">内　訳</th>'+
          '<th style="border:1px solid #333;padding:6px 8px;text-align:center;font-weight:700;background:#fff">枚数</th>'+
        '</tr>'+
      '</thead>'+
      '<tbody>'+itemRows+'</tbody>'+
      '<tfoot>'+
        '<tr>'+
          '<td colspan="3" style="border:1px solid #333;padding:8px 12px;font-weight:700;font-size:14px">合計金額　¥</td>'+
          '<td style="border:1px solid #333;padding:8px 12px;font-size:15px;font-weight:700;text-align:right">'+fmt(a.total)+'</td>'+
        '</tr>'+
      '</tfoot>'+
    '</table>'+

    // 日付
    '<div style="text-align:center;font-size:13px;margin-bottom:12px">'+toReiwa(dateStr)+'</div>'+

    '<div style="font-size:12px;margin-bottom:20px">上記合計金額正に受領いたしました。</div>'+

    // 精算者
    '<div style="font-size:13px">精算者氏名　<span style="font-size:15px;font-weight:700;border-bottom:1.5px solid #000;padding-bottom:2px;display:inline-block;min-width:140px">'+a.person+'</span></div>'+

    // 申請ID
    '<div style="position:absolute;bottom:8px;right:12px;font-size:10px;color:#9ca3af">'+a.id+'</div>'+
    '</div>'
  );
}

function renderDepHistory(){
  var el = document.getElementById('dep-history');
  if(!el) return;
  if(!DEPOSITS.length){ el.innerHTML=''; return; }
  el.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">入金履歴</div>'+
    DEPOSITS.slice().reverse().map(function(d){
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px">'+
        '<div><span style="color:#9ca3af">'+d.date+'</span>　'+d.memo+'</div>'+
        '<div style="font-weight:700;color:#2563eb">+¥'+fmt(d.amount)+'</div></div>';
    }).join('');
}

function renderAdminList(){
  updateBalanceUI();
  var t=APPS.reduce(function(s,a){return s+(a.total||0);},0);
  var p=APPS.filter(function(a){return !isPaid(a);}).length;
  $e('c1').textContent='¥'+fmt(t);
  $e('c2').textContent=p+'件';

  var el=$e('al');

  // 入出金記録タブ
  if(CURRENT_FILTER==='ledger'){
    // 入金データ行
    var depRows = DEPOSITS.map(function(d){
      return {_type:'deposit', date:d.date, label:'入金', desc:d.memo, amount:d.amount, id:d.id};
    });
    // 精算完了の申請行
    var appRows = APPS.filter(isPaid).map(function(a){
      var rcptCount = a.receipts ? a.receipts.length : 1;
      return {_type:'app', date:a.settlement_date||a.date, label:'出金', desc:a.person+'　'+rcptCount+'件レシート清算', amount:a.total, id:a.id, app:a};
    });
    var ledger = depRows.concat(appRows).sort(function(a,b){return a.date>b.date?-1:a.date<b.date?1:0;});
    if(!ledger.length){
      el.innerHTML='<p style="color:#9ca3af;text-align:center;padding:24px">入出金記録はありません</p>';
      return;
    }
    el.innerHTML = ledger.map(function(row){
      var isIn = row._type==='deposit';
      var amtColor = isIn ? '#2563eb' : '#dc2626';
      var amtPrefix = isIn ? '+' : '-';
      var badge = isIn
        ? '<span style="background:#dbeafe;color:#2563eb;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">入金</span>'
        : '<span style="background:#fee2e2;color:#dc2626;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">出金</span>';
      var onclick = isIn ? '' : ' onclick="shD(\''+row.id+'\')"';
      return '<div class="li"'+onclick+' style="'+(isIn?'':'cursor:pointer')+'">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div><div style="font-size:12px;color:#9ca3af">'+row.date+'　'+badge+'</div>' +
        '<div style="font-weight:600;margin-top:4px">'+row.desc+'</div></div>' +
        '<div style="text-align:right;font-weight:700;font-size:16px;color:'+amtColor+'">'+amtPrefix+'¥'+fmt(row.amount)+'</div>' +
        '</div></div>';
    }).join('');
    return;
  }

  // 通常フィルター
  if(!APPS.length){
    el.innerHTML='<p style="color:#9ca3af;text-align:center;padding:24px">申請はありません</p>';
    return;
  }
  var filtered = APPS.slice().reverse().filter(function(a){
    if(CURRENT_FILTER==='all') return true;
    if(CURRENT_FILTER==='paid') return isPaid(a);
    if(CURRENT_FILTER==='unsigned') return a.status!=='paid'&&a.status!=='精算済'&&a.status!=='signed';
    return true;
  });
  if(!filtered.length){
    el.innerHTML='<p style="color:#9ca3af;text-align:center;padding:24px">該当する申請はありません</p>';
    return;
  }
  el.innerHTML=filtered.map(function(a){
    var rcptCount = a.receipts ? a.receipts.length : 1;
    return '<div class="li" onclick="shD(\''+a.id+'\')">'+
      '<div style="display:flex;justify-content:space-between">'+
      '<div><div style="font-size:12px;color:#9ca3af">'+a.date+'</div><div style="font-weight:600;margin-top:2px">'+a.person+'　'+rcptCount+'件レシート清算</div></div>'+
      '<div style="text-align:right"><div style="font-weight:700;color:#dc2626;font-size:16px">¥'+fmt(a.total)+'</div>'+stLabel(a.status)+'</div></div>'+
      '<div style="font-size:11px;color:#9ca3af;margin-top:6px">'+a.id+'</div></div>';
  }).join('');
}

function shD(id){
  var a=APPS.find(function(x){return x.id===id;});if(!a)return;

  var receiptDetail='';
  if(a.receipts&&a.receipts.length>0){
    receiptDetail=a.receipts.map(function(r,ri){
      var itemRows=(r.items||[]).map(function(it){
        return '<tr><td>'+it.name+'</td><td>'+(it.account||'—')+'</td><td>'+(it.tax_category||'—')+'</td><td style="text-align:right">¥'+fmt(it.amount)+'</td></tr>';
      }).join('');
      return '<div style="margin-bottom:12px">'+
        '<div class="rbadge">レシート '+(ri+1)+'</div>'+
        '<div style="font-size:12px;color:#6b7280;margin:4px 0 6px">'+r.store+'　'+r.date+(r.invoice?'　'+r.invoice:'')+'</div>'+
        '<table class="tbl"><thead><tr><th>商品名</th><th>勘定科目</th><th>税区分</th><th>金額</th></tr></thead><tbody>'+itemRows+'</tbody></table>'+
        '<div style="text-align:right;font-size:13px;font-weight:700;margin-top:6px;color:#dc2626">小計: ¥'+fmt(r.total)+'</div>'+
        (r.b64?'<img src="data:'+r.mime+';base64,'+r.b64+'" style="width:100%;border-radius:8px;margin-top:8px"/>':'')+
        '</div>';
    }).join('<hr/>');
  } else {
    var rows=(a.items||[]).map(function(it){return '<tr><td>'+it.name+'</td><td>'+(it.account||'—')+'</td><td>'+(it.tax_category||'—')+'</td><td style="text-align:right">¥'+fmt(it.amount)+'</td></tr>';}).join('');
    receiptDetail='<table class="tbl"><thead><tr><th>商品名</th><th>勘定科目</th><th>税区分</th><th>金額</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  var signSection='';
  if(!isPaid(a)){
    if(a.client_sign){
      signSection=
        '<hr/>'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px">電子サイン（顧問先）</div>'+
        '<img src="'+a.client_sign+'" style="border:1px solid #e5e7eb;border-radius:8px;width:100%;max-height:100px;object-fit:contain"/>'+
        '<div style="font-size:11px;color:#9ca3af;margin-top:4px">署名日時：'+(a.client_signed_at||'')+'</div>'+
        '<hr/>'+
        '<button class="btn bg" id="paybtn">現金精算を完了する</button>';
    } else {
      signSection=
        '<hr/><div class="sign-box">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px">電子サイン（顧問先）</div>'+
        '<p style="font-size:12px;color:#6b7280;margin-bottom:10px">現金精算前に署名してください</p>'+
        '<canvas id="ccvs" height="120" style="border:2px solid #e5e7eb;border-radius:8px;width:100%;touch-action:none;cursor:crosshair;background:#fff;display:block"></canvas>'+
        '<div style="display:flex;gap:8px;margin-top:8px;align-items:center">'+
        '<button id="cclr" style="padding:6px 12px;background:#f3f4f6;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">クリア</button>'+
        '<span id="csl" style="display:none;font-size:12px;color:#16a34a;font-weight:600">✓ 署名済み</span>'+
        '</div>'+
        '<button class="btn bg" id="savesignbtn" style="margin-top:12px">署名を保存する</button>'+
        '</div><hr/>'+
        '<button class="btn bd" id="paybtn" disabled>現金精算を完了する</button>'+
        '<p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:6px">※電子サイン完了後に精算できます</p>';
    }
  } else {
    // 精算完了済み → 印刷ボタン
    signSection =
      '<hr/>'+
      '<button class="btn" onclick="clsM();openPrintModal(\''+a.id+'\')" style="background:#1c1917;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:14px;width:100%;cursor:pointer;font-family:inherit;margin-top:4px">🖨 精算書を印刷する</button>';
  }

  $e('mb').innerHTML=
    '<div class="banner" style="margin-bottom:16px">'+
    '<div style="font-size:11px;color:#9ca3af;margin-bottom:2px">合計金額</div>'+
    '<div style="font-size:24px;font-weight:700">¥'+fmt(a.total)+'</div>'+
    '<div style="font-size:11px;color:#9ca3af;margin-top:4px">精算日：<b style="color:#fff">'+(a.settlement_date||'未精算')+'</b></div>'+
    '</div>'+
    '<div class="idb"><div style="font-size:11px;color:#9ca3af;margin-bottom:6px">申請ID</div><div style="font-size:18px;font-weight:700;letter-spacing:2px">'+a.id+'</div></div>'+
    '<div style="margin-bottom:12px;text-align:center">'+stLabel(a.status)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">'+
    '<div><span style="color:#9ca3af">申請者</span><br><b>'+a.person+'</b></div>'+
    '<div><span style="color:#9ca3af">申請日</span><br><b>'+a.date+'</b></div>'+
    '</div><hr/>'+
    receiptDetail+
    (a.sign&&a.sign.startsWith('data:')
      ?'<hr/><div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:8px">電子サイン（申請者）</div><img src="'+a.sign+'" style="border:1px solid #e5e7eb;border-radius:8px;width:100%;max-height:100px;object-fit:contain"/>'
      :'')+
    signSection;

  $e('ov').style.display='block';

  var paybtn=$e('paybtn');
  if(paybtn){
    paybtn.onclick=function(){
      if(paybtn.disabled)return;
      a.status='paid';
      a.paid_at=new Date().toISOString();
      sv();
      updateSheet(a.id, {status:'paid'});
      clsM();renderAdminList();
      alert('精算完了しました');
    };
  }

  if(!a.client_sign&&!isPaid(a)){
    var cv=$e('ccvs');
    if(cv){
      cv.width=cv.parentElement.offsetWidth-32;
      var csigned=false,cdr=false;
      var ctx=cv.getContext('2d');
      ctx.strokeStyle='#1c1917';ctx.lineWidth=2;ctx.lineCap='round';
      function cxy(e){var r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
      cv.onmousedown=cv.ontouchstart=function(e){e.preventDefault();cdr=true;var p=cxy(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
      cv.onmousemove=cv.ontouchmove=function(e){e.preventDefault();if(!cdr)return;var p=cxy(e);ctx.lineTo(p.x,p.y);ctx.stroke();csigned=true;$e('csl').style.display='inline';};
      cv.onmouseup=cv.ontouchend=function(){cdr=false;};
      $e('cclr').onclick=function(){ctx.clearRect(0,0,cv.width,cv.height);csigned=false;$e('csl').style.display='none';};
      $e('savesignbtn').onclick=function(){
        if(!csigned){alert('署名を記入してください');return;}
        var now=new Date();
        a.client_sign=cv.toDataURL();
        a.client_signed_at=now.toLocaleString('ja-JP');
        a.settlement_date=now.toISOString().slice(0,10);
        a.status='signed';
        sv();
        updateSheet(a.id, {status:'signed', settlement_date:a.settlement_date, client_sign:true, client_signed_at:a.client_signed_at});
        clsM();shD(id);renderAdminList();
      };
    }
  }
}

function clsM(){$e('ov').style.display='none';}

function dlCSV(){
  function esc(v){var s=String(v==null?'':v);return(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;}
  function stJa(s){
    if(s==='paid'||s==='精算済') return '精算完了';
    if(s==='signed') return 'サイン済（未精算）';
    return '未精算';
  }

  var rows, filename;

  if(CURRENT_FILTER==='ledger'){
    // 入出金記録モード
    rows=[['日付','申請者','内容','金額（総額）','清算ステータス']];
    var depRows = DEPOSITS.map(function(d){
      return {date:d.date, person:'（入金）', desc:d.memo, amount:'+¥'+fmt(d.amount), status:'－'};
    });
    var appRows = APPS.filter(isPaid).map(function(a){
      var rcptCount = a.receipts ? a.receipts.length : 1;
      return {date:a.settlement_date||a.date, person:a.person, desc:rcptCount+'件レシート清算', amount:'¥'+fmt(a.total), status:'精算完了'};
    });
    depRows.concat(appRows).sort(function(a,b){return a.date>b.date?-1:a.date<b.date?1:0;}).forEach(function(r){
      rows.push([r.date, r.person, r.desc, r.amount, r.status]);
    });
    filename = '入出金記録_'+today()+'.csv';
  } else {
    // 通常モード（現フィルターに応じて）
    if(!APPS.length){alert('申請データがありません');return;}
    rows=[['日付','申請者','内容','金額（総額）','清算ステータス']];
    var filtered = APPS.filter(function(a){
      if(CURRENT_FILTER==='all') return true;
      if(CURRENT_FILTER==='paid') return isPaid(a);
      if(CURRENT_FILTER==='unsigned') return a.status!=='paid'&&a.status!=='精算済'&&a.status!=='signed';
      return true;
    });
    filtered.forEach(function(a){
      var csvDate = a.settlement_date || a.date;
      var rcptCount = a.receipts ? a.receipts.length : 1;
      rows.push([csvDate, a.person, rcptCount+'件レシート清算', '¥'+fmt(a.total), stJa(a.status)]);
    });
    filename = '現金精算_'+today()+'.csv';
  }

  if(rows.length<=1){alert('出力するデータがありません');return;}
  var csv='\uFEFF'+rows.map(function(r){return r.map(esc).join(',');}).join('\n');
  var link=document.createElement('a');
  link.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  link.download=filename;
  link.click();
}
